# This rule is not used by the project s3-monitor-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the storage.a1010s.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: s3-monitor-operator
    app.kubernetes.io/managed-by: kustomize
  name: bucketmonitor-editor-role
rules:
- apiGroups:
  - storage.a1010s.io
  resources:
  - bucketmonitors
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - storage.a1010s.io
  resources:
  - bucketmonitors/status
  verbs:
  - get
